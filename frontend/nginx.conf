events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── React Router: serve index.html for all unknown routes ────────
    # Without this, refreshing on /doubts/123 returns 404
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── Proxy: forward /api requests to the backend container ────────
    location /api {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Proxy: forward Socket.io WebSocket connections ────────────────
    # The Upgrade + Connection headers are required for WebSocket handshake
    location /socket.io {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Proxy: serve uploaded images from backend ─────────────────────
    location /uploads {
      proxy_pass http://backend:5000;
      proxy_set_header Host $host;
    }

    # ── Static file caching ───────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}