version: '3.8'

services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: doubt_postgres
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: doubtsolverdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 2. Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: doubt_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── 3. Zookeeper (required by Kafka) ──────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: doubt_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  # ── 4. Kafka ──────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: doubt_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT     → used by backend container (Docker internal network)
      # PLAINTEXT_HOST → used by host machine tools (e.g. Kafka UI, local testing)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  # ── 5. Backend (Node.js) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doubt_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://student:password123@postgres:5432/doubtsolverdb
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: super_secret_jwt_key_change_this_in_production_min32chars
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    volumes:
      # Mount uploads directory so images persist across container restarts
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── 6. Frontend (React via Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doubt_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

# ── Named Volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
